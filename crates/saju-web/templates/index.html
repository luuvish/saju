<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사주팔자 계산기</title>
    <link rel="stylesheet" href="/static/css/style.css?v=6">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>사주팔자 계산기</h1>
            <p class="subtitle">입춘 기준 사주 분석</p>
        </header>

        <form hx-post="/calculate" hx-target="#result" hx-swap="innerHTML" hx-indicator="#loading"
              hx-trigger="load, formChanged">
            <div class="form-grid">
                <div class="form-group">
                    <label for="date">생년월일</label>
                    <input type="date" id="date" name="date" required value="2000-01-15">
                </div>
                <div class="form-group">
                    <label for="time">출생 시간</label>
                    <input type="time" id="time" name="time" required value="12:00">
                </div>
                <div class="form-group">
                    <label for="calendar">달력</label>
                    <select id="calendar" name="calendar">
                        <option value="solar" selected>양력 (Solar)</option>
                        <option value="lunar">음력 (Lunar)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="gender">성별</label>
                    <select id="gender" name="gender">
                        <option value="male" selected>남 (Male)</option>
                        <option value="female">여 (Female)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="tz">시간대</label>
                    <select id="tz" name="tz">
                        <option value="Asia/Seoul" selected>Asia/Seoul (+09:00)</option>
                        <option value="Asia/Tokyo">Asia/Tokyo (+09:00)</option>
                        <option value="Asia/Shanghai">Asia/Shanghai (+08:00)</option>
                        <option value="America/New_York">America/New_York (-05:00)</option>
                        <option value="America/Los_Angeles">America/Los_Angeles (-08:00)</option>
                        <option value="Europe/London">Europe/London (+00:00)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="location">지역 (LMT 보정)</label>
                    <select id="location" name="location">
                        <option value="">선택 안함</option>
                        {% for loc in locations %}
                        <option value="{{ loc.key }}"{% if loc.key == "seoul" %} selected{% endif %}>{{ loc.display }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="lang">언어</label>
                    <select id="lang" name="lang">
                        <option value="ko" selected>한국어</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <div class="form-group checkbox-group">
                    <label class="checkbox-control">
                        <input type="checkbox" name="leap_month" value="on">
                        윤달 (Leap month)
                    </label>
                </div>
            </div>
        </form>

        <div id="loading" class="htmx-indicator">
            <div class="spinner"></div>
            <span>계산 중...</span>
        </div>

        <div id="result"></div>
    </div>

    <script>
    (function() {
        const form = document.querySelector('form');
        let debounce;
        function triggerUpdate() {
            clearTimeout(debounce);
            debounce = setTimeout(function() {
                htmx.trigger(form, 'formChanged');
            }, 200);
        }
        form.querySelectorAll('input, select').forEach(function(el) {
            el.addEventListener('change', triggerUpdate);
            el.addEventListener('input', triggerUpdate);
        });
    })();

    document.body.addEventListener('htmx:afterSwap', function(event) {
        if (event.detail.target.id === 'result') {
            initCharts();
        }
    });

    function initCharts() {
        const canvas = document.getElementById('elementsChart');
        if (!canvas) return;

        const labels = JSON.parse(canvas.dataset.labels || '[]');
        const values = JSON.parse(canvas.dataset.values || '[]');
        const colors = JSON.parse(canvas.dataset.colors || '[]');

        if (canvas._chart) canvas._chart.destroy();

        canvas._chart = new Chart(canvas, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: colors,
                    borderWidth: 2,
                    borderColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    }
    </script>
</body>
</html>
